<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k+- Low-Level Runtime v4</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #141414;
            color: #e5e7eb;
            margin: 0;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #4f46e5;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        h2, h3 { margin: 0; color: #ffffff; }
        .system-badge {
            background-color: #4f46e5;
            color: #fff;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            margin-left: 10px;
        }
        .user-panel {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-panel img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid #10b981;
        }
        .btn {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn:hover { background-color: #4338ca; }
        .btn-logout { background-color: #dc2626; }
        .btn-logout:hover { background-color: #b91c1c; }
        .btn-run { background-color: #10b981; }
        .btn-run:hover { background-color: #059669; }
        
        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .main-layout { grid-template-columns: 1fr 1fr; }
        }
        .panel {
            background-color: #1f1f1f;
            border: 1px solid #2e2e2e;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        /* Vùng Settings */
        .settings-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            background-color: #1a1a1a;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #2d2d2d;
            font-size: 14px;
            align-items: center;
        }
        .settings-bar select {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 5px 10px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }

        textarea, .output-box {
            width: 100%;
            height: 380px;
            background-color: #0b0b0b;
            color: #38bdf8;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 15px;
            margin-top: 5px;
        }
        textarea { resize: none; outline: none; }
        textarea:focus { border-color: #4f46e5; }
        .output-box { color: #34d399; white-space: pre-wrap; overflow-y: auto; }
        .action-bar { display: flex; justify-content: flex-end; margin-top: 5px; }

        /* Matrix Theme Overrides */
        body.matrix-theme { background-color: #000000; color: #00ff00; }
        body.matrix-theme .panel { background-color: #050505; border-color: #00ff00; }
        body.matrix-theme textarea { color: #00ff00; border-color: #005500; background-color: #000; }
        body.matrix-theme .output-box { color: #00ff00; border-color: #005500; background-color: #000; }
        body.matrix-theme h2, body.matrix-theme h3 { color: #00ff00; }
        body.matrix-theme .settings-bar { background-color: #0a0a0a; border-color: #00ff00; }
    </style>
</head>
<body>

    <header>
        <div>
            <h2>k+- System<span class="system-badge">Runtime v4</span></h2>
        </div>
        <div id="auth-section">
            <button id="btn-login" class="btn">Đăng nhập bằng Google</button>
        </div>
    </header>

    <div class="main-layout">
        <div class="panel">
            <h3>Mã nguồn k+- :</h3>
            
            <!-- BẢNG CÀI ĐẶT (SETTINGS) -->
            <div class="settings-bar">
                <label>
                    Kích thước chữ:
                    <select id="setting-font-size">
                        <option value="13px">Nhỏ</option>
                        <option value="15px" selected>Vừa</option>
                        <option value="18px">Lớn</option>
                        <option value="22px">Rất lớn</option>
                    </select>
                </label>
                <label>
                    Giao diện:
                    <select id="setting-theme">
                        <option value="dark" selected>Mặc định (Tối)</option>
                        <option value="matrix">Ma trận (Matrix)</option>
                    </select>
                </label>
            </div>

            <textarea id="code-input" placeholder="// Gõ 'hlep' để xem hướng dẫn hệ thống&#10;hlep&#10;var x = null&#10;kyac ceyk x"></textarea>
            <div class="action-bar">
                <button id="btn-run" class="btn btn-run">⚙ Thực thi Hệ thống</button>
            </div>
        </div>
        
        <div class="panel">
            <h3>Kết quả Console:</h3>
            <div id="console-output" class="output-box">k+- Core: Sẵn sàng nhận lệnh...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVaJfSiLGFUpR_xWsoXV9LYXyqtenaURE",
            authDomain: "irhez-app.firebaseapp.com",
            projectId: "irhez-app",
            storageBucket: "irhez-app.firebasestorage.app",
            messagingSenderId: "31582734069",
            appId: "1:31582734069:web:fa72db9fe3a6dee2dea7bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const authSection = document.getElementById('auth-section');
        const codeInput = document.getElementById('code-input');
        const consoleOutput = document.getElementById('console-output');
        const runBtn = document.getElementById('btn-run');
        
        // Phần tử điều khiển Settings
        const settingFontSize = document.getElementById('setting-font-size');
        const settingTheme = document.getElementById('setting-theme');

        // Logic xử lý cấu hình Settings nhanh
        settingFontSize.addEventListener('change', () => {
            const size = settingFontSize.value;
            codeInput.style.fontSize = size;
            consoleOutput.style.fontSize = size;
        });

        settingTheme.addEventListener('change', () => {
            if (settingTheme.value === 'matrix') {
                document.body.classList.add('matrix-theme');
            } else {
                document.body.classList.remove('matrix-theme');
            }
        });

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authSection.innerHTML = `
                    <div class="user-panel">
                        <img src="${user.photoURL}" alt="Avatar">
                        <span>${user.displayName}</span>
                        <button id="btn-logout" class="btn btn-logout">Đăng xuất</button>
                    </div>
                `;
                document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));
            } else {
                authSection.innerHTML = `<button id="btn-login" class="btn">Đăng nhập bằng Google</button>`;
                document.getElementById('btn-login').addEventListener('click', () => {
                    signInWithPopup(auth, provider).catch(error => {
                        console.error("Lỗi auth:", error);
                    });
                });
            }
        });

        // Bộ nhớ lưu trữ biến toàn cục
        let variables = {};

        // 1. LEXER: B bóc tách mã nguồn, bắt lỗi chuỗi chưa đóng
        function tokenize(code, lineNum) {
            const tokens = [];
            let i = 0;
            while (i < code.length) {
                let char = code[i];

                if (/\s/.test(char)) { i++; continue; }

                if (char === '/' && code[i+1] === '/') {
                    while (i < code.length && code[i] !== '\n') i++;
                    continue;
                }

                if (char === '"') {
                    let value = "";
                    i++; 
                    let closed = false;
                    while (i < code.length) {
                        if (code[i] === '"') {
                            closed = true;
                            i++;
                            break;
                        }
                        value += code[i];
                        i++;
                    }
                    if (!closed) {
                        throw new Error(`Syntax Error (Dòng ${lineNum}): Chuỗi ký tự không được đóng ngoặc kép (Unterminated String).`);
                    }
                    tokens.push({ type: 'STRING', value: value });
                    continue;
                }

                if (/[0-9]/.test(char)) {
                    let value = "";
                    while (i < code.length && /[0-9.]/.test(code[i])) {
                        value += code[i];
                        i++;
                    }
                    tokens.push({ type: 'NUMBER', value: Number(value) });
                    continue;
                }

                if (/[a-zA-Z_]/.test(char)) {
                    let value = "";
                    while (i < code.length && /[a-zA-Z0-9_]/.test(code[i])) {
                        value += code[i];
                        i++;
                    }
                    if (value === 'var' || value === 'kyac' || value === 'ceyk' || value === 'hlep') {
                        tokens.push({ type: 'KEYWORD', value: value });
                    } else if (value === 'true' || value === 'false') {
                        tokens.push({ type: 'BOOLEAN', value: value === 'true' });
                    } else if (value === 'null') {
                        tokens.push({ type: 'NULL', value: null });
                    } else {
                        tokens.push({ type: 'IDENTIFIER', value: value });
                    }
                    continue;
                }

                if (['=', '+', '-', '*', '/', '!', '>', '<'].includes(char)) {
                    let nextChar = code[i+1];
                    if ((char === '=' && nextChar === '=') || (char === '!' && nextChar === '=')) {
                        tokens.push({ type: 'OPERATOR', value: char + nextChar });
                        i += 2;
                    } else {
                        tokens.push({ type: 'OPERATOR', value: char });
                        i++;
                    }
                    continue;
                }

                if (char === '(' || char === ')') {
                    tokens.push({ type: 'PAREN', value: char });
                    i++;
                    continue;
                }

                throw new Error(`Syntax Error (Dòng ${lineNum}): Ký tự lạ không hợp lệ "${char}"`);
            }
            return tokens;
        }

        // 2. EVALUATOR: Xử lý Stack toán học, các phép toán logic so sánh và null
        function evaluateLowLevelExpression(tokens, lineNum) {
            const outputQueue = [];
            const operatorStack = [];
            
            const precedence = {
                '==': 1, '!=': 1, '>': 1, '<': 1,
                '+': 2, '-': 2,
                '*': 3, '/': 3
            };

            for (let i = 0; i < tokens.length; i++) {
                let token = tokens[i];

                if (token.type === 'NUMBER' || token.type === 'BOOLEAN' || token.type === 'NULL') {
                    outputQueue.push(token);
                } else if (token.type === 'IDENTIFIER') {
                    if (variables.hasOwnProperty(token.value)) {
                        let targetVal = variables[token.value];
                        if (targetVal === null) {
                            outputQueue.push({ type: 'NULL', value: null });
                        } else if (typeof targetVal === 'boolean') {
                            outputQueue.push({ type: 'BOOLEAN', value: targetVal });
                        } else {
                            outputQueue.push({ type: 'NUMBER', value: targetVal });
                        }
                    } else {
                        throw new Error(`Name Error (Dòng ${lineNum}): Biến "${token.value}" không tồn tại.`);
                    }
                } else if (token.type === 'OPERATOR') {
                    while (operatorStack.length > 0 && 
                           operatorStack[operatorStack.length - 1].type === 'OPERATOR' && 
                           precedence[operatorStack[operatorStack.length - 1].value] >= precedence[token.value]) {
                        outputQueue.push(operatorStack.pop());
                    }
                    operatorStack.push(token);
                } else if (token.type === 'PAREN' && token.value === '(') {
                    operatorStack.push(token);
                } else if (token.type === 'PAREN' && token.value === ')') {
                    while (operatorStack.length > 0 && operatorStack[operatorStack.length - 1].value !== '(') {
                        outputQueue.push(operatorStack.pop());
                    }
                    if (operatorStack.length === 0) throw new Error(`Syntax Error (Dòng ${lineNum}): Thiếu dấu ngoặc mở "(".`);
                    operatorStack.pop(); 
                }
            }

            while (operatorStack.length > 0) {
                let op = operatorStack.pop();
                if (op.type === 'PAREN') throw new Error(`Syntax Error (Dòng ${lineNum}): Mất cân bằng dấu đóng mở ngoặc.`);
                outputQueue.push(op);
            }

            const evaluationStack = [];
            for (let i = 0; i < outputQueue.length; i++) {
                let token = outputQueue[i];

                if (token.type === 'NUMBER' || token.type === 'BOOLEAN' || token.type === 'NULL') {
                    evaluationStack.push(token.value);
                } else if (token.type === 'OPERATOR') {
                    if (evaluationStack.length < 2) throw new Error(`Syntax Error (Dòng ${lineNum}): Thiếu toán hạng toán tử.`);
                    let b = evaluationStack.pop();
                    let a = evaluationStack.pop();

                    if (token.value === '==') {
                        evaluationStack.push(a === b);
                        continue;
                    }
                    if (token.value === '!=') {
                        evaluationStack.push(a !== b);
                        continue;
                    }

                    if (a === null || b === null) {
                        throw new Error(`Runtime Error (Dòng ${lineNum}): Không thể tính toán "${token.value}" trên đối tượng null.`);
                    }

                    switch (token.value) {
                        case '+': evaluationStack.push(a + b); break;
                        case '-': evaluationStack.push(a - b); break;
                        case '*': evaluationStack.push(a * b); break;
                        case '/': 
                            if (b === 0) throw new Error(`Runtime Error (Dòng ${lineNum}): Lỗi chia cho số 0 (Division by zero).`);
                            evaluationStack.push(a / b); 
                            break;
                        case '>':  evaluationStack.push(a > b); break;
                        case '<':  evaluationStack.push(a < b); break;
                    }
                }
            }

            if (evaluationStack.length !== 1) throw new Error(`Syntax Error (Dòng ${lineNum}): Biểu thức tính toán bị lỗi.`);
            return evaluationStack[0];
        }

        // 3. RUNTIME CORE LOOP
        runBtn.addEventListener('click', () => {
            const code = codeInput.value.trim();
            if (!code) {
                consoleOutput.textContent = "k+- Error: Không tìm thấy mã nguồn.";
                return;
            }

            consoleOutput.textContent = "[k+- Engine v4] Bắt đầu thực thi mã nguồn...\n";
            consoleOutput.textContent += `-------------------------------------------\n`;

            variables = {}; 
            const lines = code.split('\n');
            let hasError = false;

            for (let i = 0; i < lines.length; i++) {
                let lineText = lines[i].trim();
                if (lineText === "" || lineText.startsWith("//")) continue;

                try {
                    const tokens = tokenize(lineText, i + 1);
                    if (tokens.length === 0) continue;

                    // LỆNH ĐẶC BIỆT CHÍNH THỨC: hlep
                    if (tokens[0].type === 'KEYWORD' && tokens[0].value === 'hlep') {
                        consoleOutput.textContent += `=== HƯỚNG DẪN CÚ PHÁP k+- ===\n`;
                        consoleOutput.textContent += `1. Khai báo biến: var [tên] = [giá trị / biểu thức]\n`;
                        consoleOutput.textContent += `2. Xuất dữ liệu:  kyac ceyk [biến / chuỗi / biểu thức]\n`;
                        consoleOutput.textContent += `3. Hệ thống cứu hộ: hlep\n`;
                        consoleOutput.textContent += `4. Kiểu dữ liệu hỗ trợ: Số, Chuỗi, true, false, null\n`;
                        consoleOutput.textContent += `5. Toán tử: +, -, *, /, ==, !=, >, <, ( )\n`;
                        consoleOutput.textContent += `=====================================\n`;
                        continue;
                    }

                    if (tokens[0].type === 'IDENTIFIER') {
                        if (tokens[0].value === 'kyca') throw new Error(`Syntax Error (Dòng ${i+1}): Không tìm thấy lệnh "kyca". Có phải ý bạn là "kyac"?`);
                    }

                    if (tokens[0].type === 'KEYWORD' && tokens[0].value === 'kyac') {
                        if (!tokens[1] || tokens[1].value !== 'ceyk') {
                            throw new Error(`Syntax Error (Dòng ${i+1}): Thiếu thành phần điều hướng "ceyk" đứng sau "kyac".`);
                        }
                        
                        let remaining = tokens.slice(2);
                        if (remaining.length === 0) throw new Error(`Syntax Error (Dòng ${i+1}): Trống dữ liệu đầu vào cho lệnh xuất.`);

                        if (remaining.length === 1 && remaining[0].type === 'STRING') {
                            consoleOutput.textContent += remaining[0].value + "\n";
                        } else {
                            let res = evaluateLowLevelExpression(remaining, i + 1);
                            consoleOutput.textContent += (res === null ? "null" : res.toString()) + "\n";
                        }
                        continue;
                    }

                    if (tokens[0].type === 'KEYWORD' && tokens[0].value === 'var') {
                        let varNameToken = tokens[1];
                        if (!varNameToken || varNameT
