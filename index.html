<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ĩrhẽζ (Ioso) Runtime Environment v1</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        h2, h3 {
            margin: 0;
            color: #ffffff;
        }
        .version-badge {
            background-color: #ff9800;
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            vertical-align: middle;
            margin-left: 10px;
        }
        .user-panel {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-panel img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid #4f46e5;
        }
        .btn {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #4338ca; }
        .btn-logout { background-color: #dc2626; }
        .btn-logout:hover { background-color: #b91c1c; }
        .btn-run { background-color: #10b981; }
        .btn-run:hover { background-color: #059669; }
        
        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .main-layout {
                flex-direction: row;
            }
            .editor-section, .output-section {
                flex: 1;
            }
        }
        .panel {
            background-color: #242424;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        textarea {
            width: 100%;
            height: 350px;
            background-color: #121212;
            color: #a9b7c6;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            resize: none;
            outline: none;
        }
        textarea:focus {
            border-color: #4f46e5;
        }
        .output-box {
            width: 100%;
            height: 350px;
            background-color: #121212;
            color: #6a9955;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 15px;
            white-space: pre-wrap;
            overflow-y: auto;
        }
        .action-bar {
            display: flex;
            justify-content: flex-end;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h2>ĩrhẽζ (Ioso) System<span class="version-badge">Runtime v1 (Temporary)</span></h2>
        </div>
        <div id="auth-section">
            <button id="btn-login" class="btn">Đăng nhập bằng Google</button>
        </div>
    </header>

    <div class="main-layout">
        <div class="editor-section panel">
            <h3>Mã nguồn (ĩrhẽζ v9):</h3>
            <textarea id="code-input" placeholder="// Nhập mã nguồn ĩrhẽζ của bạn vào đây...&#10;// Cấu trúc SOV (Subject - Object - Verb)"></textarea>
            <div class="action-bar">
                <button id="btn-run" class="btn btn-run">▶ Thực thi (Run)</button>
            </div>
        </div>
        
        <div class="output-section panel">
            <h3>Kết quả đầu ra (Console):</h3>
            <div id="console-output" class="output-box">Hệ thống sẵn sàng...&#10;Đang sử dụng tạm thời: Runtime v1 (Mô phỏng cục bộ)</div>
        </div>
    </div>

    <!-- HỆ THỐNG FIREBASE & XỬ LÝ RUNTIME V1 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Cấu hình Firebase irhez-app của bạn
        const firebaseConfig = {
            apiKey: "AIzaSyAVaJfSiLGFUpR_xWsoXV9LYXyqtenaURE",
            authDomain: "irhez-app.firebaseapp.com",
            projectId: "irhez-app",
            storageBucket: "irhez-app.firebasestorage.app",
            messagingSenderId: "31582734069",
            appId: "1:31582734069:web:fa72db9fe3a6dee2dea7bc"
        };

        // Khởi tạo
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const authSection = document.getElementById('auth-section');
        const codeInput = document.getElementById('code-input');
        const consoleOutput = document.getElementById('console-output');
        const runBtn = document.getElementById('btn-run');

        // Theo dõi trạng thái đăng nhập
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authSection.innerHTML = `
                    <div class="user-panel">
                        <img src="${user.photoURL}" alt="Avatar">
                        <span>${user.displayName}</span>
                        <button id="btn-logout" class="btn btn-logout">Đăng xuất</button>
                    </div>
                `;
                document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));
            } else {
                authSection.innerHTML = `<button id="btn-login" class="btn">Đăng nhập bằng Google</button>`;
                document.getElementById('btn-login').addEventListener('click', () => {
                    signInWithPopup(auth, provider).catch(error => {
                        console.error("Lỗi đăng nhập:", error);
                        alert("Lỗi kết nối Firebase Auth: " + error.message);
                    });
                });
            }
        });

        // Xử lý Runtime v1 tạm thời
        runBtn.addEventListener('click', () => {
            const code = codeInput.value.trim();
            if (!code) {
                consoleOutput.textContent = "Lỗi: Không tìm thấy mã nguồn để thực thi.";
                return;
            }

            consoleOutput.textContent = "[Khởi động] Đang biên dịch qua Runtime v1...\n";
            
            setTimeout(() => {
                consoleOutput.textContent += `[Phân tích cú pháp] Nhận diện thành công cấu trúc chuỗi.\n`;
                consoleOutput.textContent += `-------------------------------------------\n`;
                consoleOutput.textContent += `[Kết quả thực thi]:\n`;
                consoleOutput.textContent += `Chạy thành công đoạn mã:\n${code}\n`;
                consoleOutput.textContent += `-------------------------------------------\n`;
                consoleOutput.textContent += `[Trạng thái]: Kết thúc phiên làm việc (0 errors).`;
            }, 300);
        });
    </script>
</body>
  </html>
