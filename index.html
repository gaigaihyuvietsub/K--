        <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k+- (Ioso) Advanced Runtime</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #141414;
            color: #e5e7eb;
            margin: 0;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #4f46e5;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        h2, h3 { margin: 0; color: #ffffff; }
        .system-badge {
            background-color: #4f46e5;
            color: #fff;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            margin-left: 10px;
        }
        .user-panel {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-panel img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid #10b981;
        }
        .btn {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn:hover { background-color: #4338ca; }
        .btn-logout { background-color: #dc2626; }
        .btn-logout:hover { background-color: #b91c1c; }
        .btn-run { background-color: #10b981; }
        .btn-run:hover { background-color: #059669; }
        
        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .main-layout { grid-template-columns: 1fr 1fr; }
        }
        .panel {
            background-color: #1f1f1f;
            border: 1px solid #2e2e2e;
            border-radius: 8px;
            padding: 15px;
        }
        textarea, .output-box {
            width: 100%;
            height: 400px;
            background-color: #0b0b0b;
            color: #38bdf8;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 15px;
            margin-top: 10px;
        }
        textarea { resize: none; outline: none; }
        textarea:focus { border-color: #4f46e5; }
        .output-box { color: #34d399; white-space: pre-wrap; overflow-y: auto; }
        .action-bar { display: flex; justify-content: flex-end; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <div>
            <h2>k+- Core System<span class="system-badge">Runtime v2</span></h2>
        </div>
        <div id="auth-section">
            <button id="btn-login" class="btn">Đăng nhập bằng Google</button>
        </div>
    </header>

    <div class="main-layout">
        <div class="panel">
            <h3>Mã nguồn đầu vào (ĩrhẽζ):</h3>
            <textarea id="code-input" placeholder="// k+- Engine khởi động...&#10;// Nhập cú pháp ngôn ngữ của bạn tại đây"></textarea>
            <div class="action-bar">
                <button id="btn-run" class="btn btn-run">⚙ Biên dịch & Thực thi</button>
            </div>
        </div>
        
        <div class="panel">
            <h3>Kết quả xử lý hệ thống:</h3>
            <div id="console-output" class="output-box">k+- Core: Sẵn sàng nhận lệnh...</div>
        </div>
    </div>

    <!-- HỆ THỐNG FIREBASE & XỬ LÝ RUNTIME K+- -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVaJfSiLGFUpR_xWsoXV9LYXyqtenaURE",
            authDomain: "irhez-app.firebaseapp.com",
            projectId: "irhez-app",
            storageBucket: "irhez-app.firebasestorage.app",
            messagingSenderId: "31582734069",
            appId: "1:31582734069:web:fa72db9fe3a6dee2dea7bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const authSection = document.getElementById('auth-section');
        const codeInput = document.getElementById('code-input');
        const consoleOutput = document.getElementById('console-output');
        const runBtn = document.getElementById('btn-run');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authSection.innerHTML = `
                    <div class="user-panel">
                        <img src="${user.photoURL}" alt="Avatar">
                        <span>${user.displayName}</span>
                        <button id="btn-logout" class="btn btn-logout">Đăng xuất</button>
                    </div>
                `;
                document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));
            } else {
                authSection.innerHTML = `<button id="btn-login" class="btn">Đăng nhập bằng Google</button>`;
                document.getElementById('btn-login').addEventListener('click', () => {
                    signInWithPopup(auth, provider).catch(error => {
                        console.error("Lỗi:", error);
                    });
                });
            }
        });

        // k+- Logic thực thi nâng cấp
        runBtn.addEventListener('click', () => {
            const code = codeInput.value.trim();
            if (!code) {
                consoleOutput.textContent = "k+- Error: Không có dữ liệu đầu vào.";
                return;
            }

            consoleOutput.textContent = "[k+- Engine]: Đang tải kiến trúc môi trường...\n";
            
            setTimeout(() => {
                consoleOutput.textContent += `[k+- Parser]: Đang cấu trúc hóa mã nguồn...\n`;
                consoleOutput.textContent += `===========================================\n`;
                consoleOutput.textContent += `[Kết quả k+-]:\n\n${code}\n\n`;
                consoleOutput.textContent += `===========================================\n`;
                consoleOutput.textContent += `[Trạng thái]: Tiến trình hoàn tất. Sẵn sàng kết nối mô-đun C++.`;
            }, 400);
        });
    </script>
</body>
</html>
