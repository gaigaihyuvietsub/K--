<!DOCTYPE html>
<html lang=vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k+- Low-Level Runtime v4</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #141414;
            color: #e5e7eb;
            margin: 0;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #4f46e5;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        h2, h3 { margin: 0; color: #ffffff; }
        .system-badge {
            background-color: #4f46e5;
            color: #fff;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            margin-left: 10px;
        }
        .user-panel {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-panel img {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid #10b981;
        }
        .btn {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 13px;
        }
        .btn:hover { background-color: #4338ca; }
        .btn-logout { background-color: #dc2626; }
        .btn-logout:hover { background-color: #b91c1c; }
        .btn-danger { background-color: #b91c1c; color: white; }
        .btn-danger:hover { background-color: #991b1b; }
        .btn-run { background-color: #10b981; padding: 10px 20px; font-size: 15px; }
        .btn-run:hover { background-color: #059669; }
        
        .main-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 768px) {
            .main-layout { grid-template-columns: 1fr 1fr; }
        }
        .panel {
            background-color: #1f1f1f;
            border: 1px solid #2e2e2e;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        /* VÙNG CONFIG & ACCOUNT SETTINGS */
        .settings-container {
            background-color: #1a1a1a;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #2d2d2d;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .settings-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 14px;
            align-items: center;
        }
        .settings-row select, .settings-row input {
            background-color: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            padding: 5px 10px;
            border-radius: 4px;
            outline: none;
        }
        .settings-row input { width: 180px; font-size: 12px; }
        .acc-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border-top: 1px dashed #333;
            padding-top: 10px;
        }

        textarea, .output-box {
            width: 100%;
            height: 340px;
            background-color: #0b0b0b;
            color: #38bdf8;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 15px;
            margin-top: 5px;
        }
        textarea { resize: none; outline: none; }
        textarea:focus { border-color: #4f46e5; }
        .output-box { color: #34d399; white-space: pre-wrap; overflow-y: auto; }
        .action-bar { display: flex; justify-content: flex-end; margin-top: 5px; }

        /* Matrix Theme */
        body.matrix-theme { background-color: #000000; color: #00ff00; }
        body.matrix-theme .panel { background-color: #050505; border-color: #00ff00; }
        body.matrix-theme textarea { color: #00ff00; border-color: #005500; background-color: #000; }
        body.matrix-theme .output-box { color: #00ff00; border-color: #005500; background-color: #000; }
        body.matrix-theme h2, body.matrix-theme h3 { color: #00ff00; }
        body.matrix-theme .settings-container { background-color: #0a0a0a; border-color: #00ff00; }
        body.matrix-theme .settings-row select, body.matrix-theme .settings-row input { border-color: #00ff00; background-color: #000; color: #00ff00; }
    </style>
</head>
<body>

    <header>
        <div>
            <h2>k+- System<span class="system-badge">Runtime v4</span></h2>
        </div>
        <div id="auth-section"></div>
    </header>

    <div class="main-layout">
        <div class="panel">
            <h3>Mã nguồn k+- & Cấu hình:</h3>
            
            <!-- HỆ THỐNG CONFIG & ACCOUNT SETTINGS ĐA NĂNG -->
            <div class="settings-container">
                <div class="settings-row">
                    <label>
                        Chữ:
                        <select id="setting-font-size">
                            <option value="13px">Nhỏ</option>
                            <option value="15px" selected>Vừa</option>
                            <option value="18px">Lớn</option>
                            <option value="22px">Rất lớn</option>
                        </select>
                    </label>
                    <label>
                        Giao diện:
                        <select id="setting-theme">
                            <option value="dark" selected>Mặc định</option>
                            <option value="matrix">Ma trận</option>
                        </select>
                    </label>
                    <label>
                        Đổi Icon URL:
                        <input type="text" id="acc-avatar-url" placeholder="Dán link ảnh đại diện mới...">
                    </label>
                </div>
                
                <!-- Thanh công cụ hành động Account -->
                <div class="acc-actions">
                    <button id="acc-btn-view" class="btn">📊 Xem dữ liệu</button>
                    <button id="acc-btn-cache" class="btn">🧹 Xoá Cache</button>
                    <button id="acc-btn-cookie" class="btn">🍪 Xoá Cook</button>
                    <button id="acc-btn-logout" class="btn btn-logout">🚪 Đăng xuất</button>
                </div>
            </div>

            <textarea id="code-input" placeholder="// Gõ 'hlep' để xem hướng dẫn hệ thống&#10;hlep&#10;var x = null&#10;kyac ceyk x"></textarea>
            <div class="action-bar">
                <button id="btn-run" class="btn btn-run">⚙ Thực thi Hệ thống</button>
            </div>
        </div>
        
        <div class="panel">
            <h3>Kết quả Console:</h3>
            <div id="console-output" class="output-box">k+- Core: Sẵn sàng nhận lệnh...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVaJfSiLGFUpR_xWsoXV9LYXyqtenaURE",
            authDomain: "irhez-app.firebaseapp.com",
            projectId: "irhez-app",
            storageBucket: "irhez-app.firebasestorage.app",
            messagingSenderId: "31582734069",
            appId: "1:31582734069:web:fa72db9fe3a6dee2dea7bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const authSection = document.getElementById('auth-section');
        const codeInput = document.getElementById('code-input');
        const consoleOutput = document.getElementById('console-output');
        const runBtn = document.getElementById('btn-run');
        
        const settingFontSize = document.getElementById('setting-font-size');
        const settingTheme = document.getElementById('setting-theme');
        const accAvatarUrl = document.getElementById('acc-avatar-url');
        
        const accBtnView = document.getElementById('acc-btn-view');
        const accBtnCache = document.getElementById('acc-btn-cache');
        const accBtnCookie = document.getElementById('acc-btn-cookie');
        const accBtnLogout = document.getElementById('acc-btn-logout');

        let currentUserData = null;
        let variables = {};

        // KIỂM TRA ĐĂNG NHẬP CHỦ ĐỘNG
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserData = user;
                // Nếu có custom avatar trong localStorage thì dùng, không thì lấy từ Google
                let savedAvatar = localStorage.getItem(`avatar_${user.uid}`) || user.photoURL;
                authSection.innerHTML = `
                    <div class="user-panel">
                        <img id="user-display-img" src="${savedAvatar}" alt="Avatar">
                        <span>${user.displayName}</span>
                    </div>
                `;
            } else {
                let currentPath = window.location.pathname;
                let newPath = currentPath.substring(0, currentPath.lastIndexOf('/')) + '/login.html';
                window.location.href = newPath;
            }
        });

        // 1. ĐỔI ICON (AVATAR)
        accAvatarUrl.addEventListener('change', () => {
            const url = accAvatarUrl.value.trim();
            if (url && currentUserData) {
                localStorage.setItem(`avatar_${currentUserData.uid}`, url);
                const imgNode = document.getElementById('user-display-img');
                if (imgNode) imgNode.src = url;
                alert("Đã cập nhật biểu tượng tài khoản hệ thống!");
            }
        });

        // 2. XEM DỮ LIỆU (VIEW DATA)
        accBtnView.addEventListener('click', () => {
            let varCount = Object.keys(variables).length;
            let cacheKeys = Object.keys(localStorage).length;
            alert(`=== THÔNG TIN DỮ LIỆU HỆ THỐNG ===\n• Tài khoản: ${currentUserData ? currentUserData.displayName : 'Chưa rõ'}\n• Số lượng biến đang chiếm RAM k+-: ${varCount}\n• Bản ghi cấu hình đang lưu trong Cache: ${cacheKeys}\n================================`);
        });

        // 3. XÓA CACHE (CLEAR CACHE)
        accBtnCache.addEventListener('click', () => {
            if (confirm("Bạn có chắc chắn muốn dọn sạch cấu hình giao diện, font chữ đã lưu?")) {
                localStorage.clear();
                alert("Đã làm sạch Cache! Vui lòng tải lại trang.");
                window.location.reload();
            }
        });

        // 4. XÓA COOKIES
        accBtnCookie.addEventListener('click', () => {
            if (confirm("Bạn có muốn dọn dẹp Cookies phiên làm việc hiện tại?")) {
                const cookies = document.cookie.split(";");
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i];
                    const eqPos = cookie.indexOf("=");
                    const name = eqPos > -1 ? cookie.substr(0, eqPos) : cookie;
                    document.cookie = name + "=;expires=Thu, 01 Jan 1970 00:00:00 GMT;path=/";
                }
                alert("Đã dọn sạch Cookies!");
            }
        });

        // 5. ĐĂNG XUẤT (LOGOUT)
        const triggerLogout = () => {
            signOut(auth).then(() => { window.location.href = "login.html"; });
        };
        accBtnLogout.addEventListener('click', triggerLogout);

        // CONFIG CHỮ VÀ THEME
        settingFontSize.addEventListener('change', () => {
            const size = settingFontSize.value;
            codeInput.style.fontSize = size;
            consoleOutput.style.fontSize = size;
        });

        settingTheme.addEventListener('change', () => {
            if (settingTheme.value === 'matrix') {
                document.body.classList.add('matrix-theme');
            } else {
                document.body.classList.remove('matrix-theme');
            }
        });

        // LÕI TRÌNH THÔNG DỊCH K+-
        function tokenize(code, lineNum) {
            const tokens = [];
            let i = 0;
            while (i < code.length) {
                let char = code[i];
                if (/\s/.test(char)) { i++; continue; }
                if (char === '/' && code[i+1] === '/') {
                    while (i < code.length && code[i] !== '\n') i++;
                    continue;
                }
                if (char === '"') {
                    let value = "";
                    i++; let closed = false;
                    while (i < code.length) {
                        if (code[i] === '"') { closed = true; i++; break; }
                        value += code[i]; i++;
                    }
                    if (!closed) throw new Error(`Syntax Error (Dòng ${lineNum}): Chuỗi ký tự không được đóng ngoặc kép.`);
                    tokens.push({ type: 'STRING', value: value });
                    continue;
                }
                if (/[0-9]/.test(char)) {
                    let value = "";
                    while (i < code.length && /[0-9.]/.test(code[i])) { value += code[i]; i++; }
                    tokens.push({ type: 'NUMBER', value: Number(value) });
                    continue;
                }
                if (/[a-zA-Z_]/.test(char)) {
                    let value = "";
                    while (i < code.length && /[a-zA-Z0-9_]/.test(code[i])) { value += code[i]; i++; }
                    if (value === 'var' || value === 'kyac' || value === 'ceyk' || value === 'hlep') {
                        tokens.push({ type: 'KEYWORD', value: value });
                    } else if (value === 'true' || value === 'false') {
                        tokens.push({ type: 'BOOLEAN', value: value === 'true' });
                    } else if (value === 'null') {
                        tokens.push({ type: 'NULL', value: null });
                    } else {
                        tokens.push({ type: 'IDENTIFIER', value: value });
                    }
                    continue;
                }
                if (['=', '+', '-', '*', '/', '!', '>', '<'].includes(char)) {
                    let nextChar = code[i+1];
                    if ((char === '=' && nextChar === '=') || (char === '!' && nextChar === '=')) {
                        tokens.push({ type: 'OPERATOR', value: char + nextChar });
                        i += 2;
                    } else {
                        tokens.push({ type: 'OPERATOR', value: char });
                        i++;
                    }
                    continue;
                }
                if (char === '(' || char === ')') {
                    tokens.push({ type: 'PAREN', value: char });
                    i++;
                    continue;
                }
                throw new Error(`Syntax Error (Dòng ${lineNum}): Ký tự lạ không hợp lệ "${char}"`);
            }
            return tokens;
        }

        function evaluateLowLevelExpression(tokens, lineNum) {
            const outputQueue = [];
            const operatorStack = [];
            const precedence = { '==': 1, '!=': 1, '>': 1, '<': 1, '+': 2, '-': 2, '*': 3, '/': 3 };

            for (let i = 0; i < tokens.length; i++) {
                let token = tokens[i];
                if (token.type === 'NUMBER' || token.type === 'BOOLEAN' || token.type === 'NULL') {
                    outputQueue.push(token);
                } else if (token.type === 'IDENTIFIER') {
                    if (variables.hasOwnProperty(token.value)) {
                        let targetVal = variables[token.value];
                        if (targetVal === null) outputQueue.push({ type: 'NULL', value: null });
                        else if (typeof targetVal === 'boolean') outputQueue.push({ type: 'BOOLEAN', value: targetVal });
                        else outputQueue.push({ type: 'NUMBER', value: targetVal });
                    } else {
                        throw new Error(`Name Error (Dòng ${lineNum}): Biến "${token.value}" không tồn tại.`);
                    }
                } else if (token.type === 'OPERATOR') {
                    while (operatorStack.length > 0 && operatorStack[operatorStack.length - 1].type === 'OPERATOR' && precedence[operatorStack[operatorStack.length - 1].value] >= precedence[token.value]) {
                        outputQueue.push(operatorStack.pop());
                    }
                    operatorStack.push(token);
                } else if (token.type === 'PAREN' && token.value === '(') {
                    operatorStack.push(token);
                } else if (token.type === 'PAREN' && token.value === ')') {
                    while (operatorStack.length > 0 && operatorStack[operatorStack.length - 1].value !== '(') {
                        outputQueue.push(operatorStack.pop());
                    }
                    if (operatorStack.length === 0) throw new Error(`Syntax Error (Dòng ${lineNum}): Thiếu dấu ngoặc mở "(".`);
                    operatorStack.pop(); 
                }
            }

            while (operatorStack.length > 0) {
                let op = operatorStack.pop();
                if (op.type === 'PAREN') throw new Error(`Syntax Error (Dòng ${lineNum}): Mất cân bằng dấu ngoặc.`);
                outputQueue.push(op);
            }

            const evaluationStack = [];
            for (let i = 0; i < outputQueue.length; i++) {
                let token = outputQueue[i];
                if (token.type === 'NUMBER' || token.type === 'BOOLEAN' || token.type === 'NULL') {
                    evaluationStack.push(token.value);
                } else if (token.type === 'OPERATOR') {
                    if (evaluationStack.length < 2) throw new Error(`Syntax Error (Dòng ${lineNum}): Thiếu toán hạng.`);
                    let b = evaluationStack.pop();
                    let a = evaluationStack.pop();

                    if (token.value === '==') { evaluationStack.push(a === b); continue; }
                    if (token.value === '!=') { evaluationStack.push(a !== b); continue; }
                    if (a === null || b === null) throw new Error(`Runtime Error (Dòng ${lineNum}): Không thể tính toán trên đối tượng null.`);

                    switch (token.value) {
                        case '+': evaluationStack.push(a + b); break;
                        case '-': evaluationStack.push(a - b); break;
                        case '*': evaluationStack.push(a * b); break;
                        case '/': if (b === 0) throw new Error(`Runtime Error (Dòng ${lineNum}): Lỗi chia cho số 0.`); evaluationStack.push(a / b); break;
                        case '>': evaluationStack.push(a > b); break;
                        case '<': evaluationStack.push(a < b); break;
                    }
                }
            }
            if (evaluationStack.length !== 1) throw new Error(`Syntax Error (Dòng ${lineNum}): Biểu thức lỗi.`);
            return evaluationStack[0];
        }

        runBtn.addEventListener('click', () => {
            const code = codeInput.value.trim();
            if (!code) { consoleOutput.textContent = "k+- Error: Không tìm thấy mã nguồn."; return; }
            consoleOutput.textContent = "[k+- Engine v4] Bắt đầu thực thi mã nguồn...\n";
            consoleOutput.textContent += `-------------------------------------------\n`;
            variables = {}; 
            const lines = code.split('\n');
            let hasError
