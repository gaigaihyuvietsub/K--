<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>k+- System Login</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #141414;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background-color: #1f1f1f;
            border: 1px solid #2e2e2e;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        h1 { margin-bottom: 10px; color: #fff; font-size: 28px; }
        p { color: #9ca3af; margin-bottom: 30px; font-size: 14px; }
        .btn-google {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.2s;
            width: 100%;
        }
        .btn-google:hover { background-color: #4338ca; }
        .status { margin-top: 15px; color: #10b981; font-size: 14px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>k+- Core System</h1>
        <p>Vui lòng xác thực tài khoản để truy cập Runtime v4</p>
        <button id="btn-login" class="btn-google">Đăng nhập bằng Google</button>
        <div id="status-msg" class="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVaJfSiLGFUpR_xWsoXV9LYXyqtenaURE",
            authDomain: "irhez-app.firebaseapp.com",
            projectId: "irhez-app",
            storageBucket: "irhez-app.firebasestorage.app",
            messagingSenderId: "31582734069",
            appId: "1:31582734069:web:fa72db9fe3a6dee2dea7bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('btn-login');
        const statusMsg = document.getElementById('status-msg');

        // Xử lý kết quả sau khi chuyển hướng đăng nhập quay trở về
        getRedirectResult(auth).then((result) => {
            if (result?.user) {
                statusMsg.textContent = "Đăng nhập thành công! Đang chuyển hướng...";
                window.location.href = "index.html";
            }
        }).catch((error) => {
            statusMsg.style.color = "#dc2626";
            statusMsg.textContent = "Lỗi xác thực: " + error.message;
        });

        // Kiểm tra trạng thái đăng nhập chủ động
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "index.html";
            }
        });

        loginBtn.addEventListener('click', () => {
            statusMsg.textContent = "Đang chuyển hướng tới Google...";
            signInWithRedirect(auth, provider);
        });
    </script>
</body>
</html>
