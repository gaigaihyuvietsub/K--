<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universe Simulator - Login</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0b0e;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        /* Hiệu ứng nền vũ trụ mờ ảo */
        .space-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: radial-gradient(circle, #1e1b4b 1px, transparent 1px), radial-gradient(circle, #311042 1px, transparent 1px);
            background-size: 40px 40px, 60px 60px;
            background-position: 0 0, 20px 20px;
            opacity: 0.3;
            animation: spaceMove 100s linear infinite;
            z-index: 1;
        }
        @keyframes spaceMove {
            from { transform: translate(0, 0); }
            to { transform: translate(-50%, -50%); }
        }
        .login-card {
            background-color: rgba(23, 23, 28, 0.85);
            border: 1px solid #3b0764;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 0 30px rgba(79, 70, 229, 0.2);
            max-width: 420px;
            width: 100%;
            backdrop-filter: blur(8px);
            z-index: 10;
        }
        h1 { 
            margin: 0 0 10px 0; 
            color: #ffffff; 
            font-size: 26px; 
            letter-spacing: 1px;
            background: linear-gradient(to right, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { color: #9ca3af; margin: 0 0 30px 0; font-size: 14px; }
        .btn-google {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.3s ease;
            width: 100%;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
        }
        .btn-google:hover { 
            background: linear-gradient(135deg, #4338ca, #6d28d9);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.4);
        }
        .btn-google:active { transform: translateY(0); }
        .status { 
            margin-top: 20px; 
            color: #10b981; 
            font-size: 14px; 
            font-family: monospace;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="space-bg"></div>

    <div class="login-card">
        <h1>Vũ Trụ Vật Lý v1.0</h1>
        <p>Khởi tạo điểm kỳ dị hành trình mô phỏng</p>
        <button id="btn-login" class="btn-google">Đăng nhập bằng Google</button>
        <div id="status-msg" class="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithRedirect, GoogleAuthProvider, getRedirectResult, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVaJfSiLGFUpR_xWsoXV9LYXyqtenaURE",
            authDomain: "irhez-app.firebaseapp.com",
            projectId: "irhez-app",
            storageBucket: "irhez-app.firebasestorage.app",
            messagingSenderId: "31582734069",
            appId: "1:31582734069:web:fa72db9fe3a6dee2dea7bc"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('btn-login');
        const statusMsg = document.getElementById('status-msg');

        // Bẫy kết quả Redirect sau khi Google trả về dữ liệu thành công
        getRedirectResult(auth).then((result) => {
            if (result?.user) {
                statusMsg.textContent = "> Hệ thống xác thực... Đang nạp Vũ trụ...";
                window.location.href = "index.html";
            }
        }).catch((error) => {
            statusMsg.style.color = "#ef4444";
            statusMsg.textContent = "❌ Lỗi: " + error.message;
            console.error(error);
        });

        // Kiểm tra chủ động xem phiên trước đã đăng nhập chưa
        onAuthStateChanged(auth, (user) => {
            if (user) {
                statusMsg.textContent = "> Phiên làm việc hợp lệ. Đang chuyển hướng...";
                window.location.href = "index.html";
            }
        });

        loginBtn.addEventListener('click', () => {
            statusMsg.textContent = "> Đang chuyển hướng cổng kết nối Google...";
            signInWithRedirect(auth, provider);
        });
    </script>
</body>
</html>
